name: Publish to WinGet

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.7.35)"
        required: true

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - name: Determine version
        id: version
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install wingetcreate
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe

      - name: Submit to winget-pkgs
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $base = "https://github.com/${{ github.repository }}/releases/download/v${version}"
          $x64  = "${base}/ElegantClipboard_${version}_x64-setup.exe"
          $arm64 = "${base}/ElegantClipboard_${version}_arm64-setup.exe"

          .\wingetcreate.exe update Y-ASLant.ElegantClipboard `
            --version $version `
            --urls $x64 $arm64 `
            --submit `
            --token ${{ secrets.UPDATER_TOKEN }}
