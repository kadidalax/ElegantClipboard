<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="/surface-tokens.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: transparent;
      user-select: none;
      -webkit-user-select: none;
      position: relative;
    }
    #wrap {
      position: absolute;
      left: 0;
      top: 0;
      display: inline-block;
      will-change: width, height, top;
    }
    body.align-right #wrap {
      left: auto;
      right: 0;
    }
    #panel {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: var(--preview-radius);
      box-shadow: var(--preview-shadow);
      overflow: hidden;
    }
    img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
      transition: opacity var(--motion-normal) var(--motion-ease);
    }
    img.loaded { opacity: 1; }
    #badge {
      position: absolute;
      bottom: var(--space-badge-offset);
      right: var(--space-badge-offset);
      background: var(--preview-badge-bg);
      color: var(--preview-badge-fg);
      font-family: var(
        --ui-font-family,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif
      );
      font-size: var(--text-badge-size);
      font-weight: 600;
      padding: var(--space-badge-padding-y) var(--space-badge-padding-x);
      border-radius: var(--radius-md);
      opacity: 0;
      transition: opacity var(--motion-relaxed) var(--motion-ease);
      pointer-events: none;
      white-space: nowrap;
    }
    #badge.visible { opacity: 1; }
  </style>
</head>
<body>
  <div id="wrap">
    <div id="panel">
      <img id="preview" />
      <div id="badge"></div>
    </div>
  </div>
  <script src="/preview-presentation.js"></script>
  <script>
    const wrap = document.getElementById('wrap');
    const img = document.getElementById('preview');
    const badge = document.getElementById('badge');
    const root = document.documentElement;
    let hideTimer = null;
    let animRaf = null;
    const currentRect = { width: 0, height: 0, top: 0 };
    const targetRect = { width: 0, height: 0, top: 0 };

    applyPreviewPresentation(root, {
      theme: window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light',
      sharpCorners: false,
      colorTheme: 'default',
    });

    function applyRect(rect) {
      wrap.style.width = rect.width + 'px';
      wrap.style.height = rect.height + 'px';
      wrap.style.top = rect.top + 'px';
    }

    function stopRectAnimation() {
      if (animRaf != null) {
        cancelAnimationFrame(animRaf);
        animRaf = null;
      }
    }

    function startRectAnimation() {
      if (animRaf != null) return;
      const animate = () => {
        const k = 0.35;
        currentRect.width += (targetRect.width - currentRect.width) * k;
        currentRect.height += (targetRect.height - currentRect.height) * k;
        currentRect.top += (targetRect.top - currentRect.top) * k;

        applyRect(currentRect);

        const done =
          Math.abs(targetRect.width - currentRect.width) < 0.2 &&
          Math.abs(targetRect.height - currentRect.height) < 0.2 &&
          Math.abs(targetRect.top - currentRect.top) < 0.2;

        if (done) {
          currentRect.width = targetRect.width;
          currentRect.height = targetRect.height;
          currentRect.top = targetRect.top;
          applyRect(currentRect);
          animRaf = null;
          return;
        }
        animRaf = requestAnimationFrame(animate);
      };
      animRaf = requestAnimationFrame(animate);
    }

    function showBadge(text) {
      badge.textContent = text;
      badge.classList.add('visible');
      if (hideTimer) clearTimeout(hideTimer);
      hideTimer = setTimeout(() => badge.classList.remove('visible'), 1200);
    }

    function clearBadge() {
      badge.classList.remove('visible');
      if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
    }

    if (window.__TAURI__) {
      const { listen } = window.__TAURI__.event;
      const { convertFileSrc } = window.__TAURI__.core;

      listen('image-preview-update', (event) => {
        const payload = event.payload || {};
        const { imagePath, width, height, offsetY, align } = payload;
        applyPreviewPresentation(root, payload);
        img.classList.remove('loaded');
        clearBadge();
        document.body.className = align === 'right' ? 'align-right' : '';
        stopRectAnimation();
        currentRect.width = width || 0;
        currentRect.height = height || 0;
        currentRect.top = offsetY || 0;
        targetRect.width = currentRect.width;
        targetRect.height = currentRect.height;
        targetRect.top = currentRect.top;
        applyRect(currentRect);
        img.src = convertFileSrc(imagePath);
      });

      listen('image-preview-zoom', (event) => {
        const payload = event.payload || {};
        const { width, height, offsetY, percent, active, align } = payload;
        applyPreviewPresentation(root, payload);
        if (align) document.body.className = align === 'right' ? 'align-right' : '';
        targetRect.width = width || 0;
        targetRect.height = height || 0;
        targetRect.top = offsetY || 0;
        startRectAnimation();
        if (active) showBadge(percent + '%');
      });

      listen('image-preview-clear', () => {
        img.classList.remove('loaded');
        img.removeAttribute('src');
        clearBadge();
        stopRectAnimation();
        currentRect.width = 0;
        currentRect.height = 0;
        currentRect.top = 0;
        targetRect.width = 0;
        targetRect.height = 0;
        targetRect.top = 0;
        applyRect(currentRect);
      });

      listen('image-preview-theme', (event) => {
        applyPreviewPresentation(root, event?.payload || {});
      });

      img.addEventListener('load', () => img.classList.add('loaded'));
      img.addEventListener('error', () => img.classList.remove('loaded'));
    }
  </script>
</body>
</html>
