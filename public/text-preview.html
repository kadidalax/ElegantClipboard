<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="/surface-tokens.css" />
  <style>
    @font-face {
      font-family: "CustomFont";
      src: url("/fonts.woff2") format("woff2");
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: transparent;
      user-select: none;
      -webkit-user-select: none;
      position: relative;
    }
    #wrap {
      position: absolute;
      inset: 0;
      padding: var(--space-preview-wrap);
      display: flex;
      align-items: stretch;
      justify-content: stretch;
    }
    #panel {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      border-radius: var(--preview-radius);
      border: 1px solid var(--preview-panel-border);
      background: var(--preview-panel-bg);
      backdrop-filter: blur(var(--blur-preview-backdrop)) saturate(110%);
      -webkit-backdrop-filter: blur(var(--blur-preview-backdrop)) saturate(110%);
      box-shadow: var(--preview-shadow);
      overflow: hidden;
      opacity: 0;
      transition:
        opacity var(--motion-fast) var(--motion-ease),
        background-color var(--motion-fast) var(--motion-ease),
        border-color var(--motion-fast) var(--motion-ease);
    }
    /* 默认/无 DWM 特效：与主窗口卡片一致，不用 backdrop-blur 避免背后界面渗色 */
    :root:not([data-window-effect="mica"]):not([data-window-effect="acrylic"]):not([data-window-effect="tabbed"]) #panel {
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }
    #panel.visible {
      opacity: 1;
    }
    #content {
      width: 100%;
      flex: 1;
      min-height: 0;
      padding: var(--space-preview-content-y) var(--space-preview-content-x);
      color: var(--preview-content);
      font-family: var(
        --ui-font-family,
        "CustomFont",
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        "PingFang SC",
        "Microsoft YaHei",
        sans-serif
      );
      font-size: var(--preview-font-size);
      line-height: 1.56;
      white-space: pre-wrap;
      word-break: break-word;
      overflow: auto;
      scrollbar-gutter: stable;
      text-overflow: initial;
    }
    #source {
      flex: 0 0 auto;
      padding: 6px var(--space-preview-content-x) 8px;
      border-top: 1px solid var(--preview-panel-border);
      color: var(--preview-content);
      font-family: var(
        --ui-font-family,
        "CustomFont",
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        "PingFang SC",
        "Microsoft YaHei",
        sans-serif
      );
      font-size: 11px;
      line-height: 1.4;
      opacity: 0.72;
    }
    #source > div {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #content::-webkit-scrollbar {
      width: var(--size-scrollbar);
    }
    #content::-webkit-scrollbar-thumb {
      border-radius: var(--radius-pill);
      background: var(--preview-scrollbar-thumb);
      border: 1px solid transparent;
      background-clip: padding-box;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <div id="panel">
      <div id="content"></div>
      <div id="source" hidden>
        <div id="source-app-name" hidden></div>
        <div id="source-file-name" hidden></div>
        <div id="source-url" hidden></div>
        <div id="source-title" hidden></div>
      </div>
    </div>
  </div>
  <script src="/preview-presentation.js"></script>
  <script>
    const panel = document.getElementById('panel');
    const content = document.getElementById('content');
    const source = document.getElementById('source');
    const sourceAppName = document.getElementById('source-app-name');
    const sourceTitle = document.getElementById('source-title');
    const sourceUrl = document.getElementById('source-url');
    const sourceFileName = document.getElementById('source-file-name');
    const root = document.documentElement;

    applyPreviewPresentation(root, {
      theme: window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light',
      sharpCorners: false,
      colorTheme: 'default',
    });

    function setSourceField(element, label, value) {
      const text = typeof value === 'string' ? value.trim() : '';
      element.textContent = text ? `${label}：${text}` : '';
      element.hidden = !text;
      return Boolean(text);
    }

    function renderSource(payload) {
      const visible = [
        setSourceField(sourceAppName, '应用', payload.sourceAppName),
        setSourceField(sourceFileName, '文件名', payload.sourceFileName),
        setSourceField(sourceUrl, '网址', payload.sourceUrl),
        setSourceField(sourceTitle, '标题', payload.sourceTitle),
      ].some(Boolean);
      source.hidden = !visible;
    }

    function clearPreview() {
      panel.classList.remove('visible');
      content.textContent = '';
      content.style.webkitLineClamp = 'unset';
      renderSource({});
    }

    if (window.__TAURI__) {
      const { listen } = window.__TAURI__.event;

      listen('text-preview-update', (event) => {
        const payload = event.payload || {};
        applyPreviewPresentation(root, payload);
        document.body.dataset.align = payload.align === 'right' ? 'right' : 'left';
        if (payload.fontFamily) {
          content.style.fontFamily = payload.fontFamily;
        } else {
          content.style.removeProperty('font-family');
        }
        if (payload.fontSize && typeof payload.fontSize === 'number') {
          content.style.fontSize = payload.fontSize + 'px';
        } else {
          content.style.fontSize = '';
        }
        content.textContent = typeof payload.text === 'string' ? payload.text : '';
        renderSource(payload);
        panel.classList.add('visible');
      });

      listen('text-preview-clear', () => {
        clearPreview();
      });

      listen('text-preview-scroll', (event) => {
        const deltaY = Number(event?.payload?.deltaY ?? 0);
        if (!Number.isFinite(deltaY) || deltaY === 0) return;
        content.scrollTop += deltaY;
      });

      listen('text-preview-theme', (event) => {
        applyPreviewPresentation(root, event?.payload || {});
      });
    }
  </script>
</body>
</html>
